components:
  parameters:
    namespace:
      name: namespace
      in: path
      required: true
      description: The Kubernetes namespace
      schema:
        type: string
    name:
      name: name
      in: path
      required: true
      description: The resource name
      schema:
        type: string
    labelSelector:
      name: labelSelector
      in: query
      description: A selector to restrict the list of returned objects by their labels
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of resources to return
      schema:
        type: integer
    continue:
      name: continue
      in: query
      description: Continue token for paginated list requests
      schema:
        type: string
  schemas:
    ObjectMeta:
      type: object
      properties:
        name:
          type: string
          description: Name of the resource
        namespace:
          type: string
          description: Namespace of the resource
        labels:
          type: object
          additionalProperties:
            type: string
          description: Map of string keys and values for organizing resources
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Unstructured key-value map for storing arbitrary metadata
        creationTimestamp:
          type: string
          format: date-time
          description: Timestamp representing the server time when this object was created
        resourceVersion:
          type: string
          description: An opaque value that represents the internal version of this object
    ListMeta:
      type: object
      properties:
        resourceVersion:
          type: string
        continue:
          type: string
    VirtualService:
      type: object
      properties:
        apiVersion:
          type: string
          enum:
            - networking.istio.io/v1
        kind:
          type: string
          enum:
            - VirtualService
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            hosts:
              type: array
              items:
                type: string
              description: >-
                The destination hosts to which traffic is being sent. Can be a
                DNS name with wildcard prefix or an IP address.
            gateways:
              type: array
              items:
                type: string
              description: >-
                The names of gateways that should apply these routes. A
                VirtualService with no gateway list will apply to sidecars only.
            http:
              type: array
              items:
                $ref: '#/components/schemas/HTTPRoute'
              description: An ordered list of route rules for HTTP traffic.
            tls:
              type: array
              items:
                type: object
              description: An ordered list of route rules for TLS and HTTPS traffic.
            tcp:
              type: array
              items:
                type: object
              description: An ordered list of route rules for TCP traffic.
            exportTo:
              type: array
              items:
                type: string
              description: >-
                A list of namespaces to which this virtual service is exported.
    VirtualServiceList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - VirtualServiceList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/VirtualService'
    HTTPRoute:
      type: object
      properties:
        name:
          type: string
          description: Name assigned to the route for debugging purposes.
        match:
          type: array
          items:
            type: object
            properties:
              uri:
                type: object
                description: URI match condition
              headers:
                type: object
                description: Header match conditions
              method:
                type: object
                description: HTTP method match condition
          description: Match conditions to be satisfied for the rule to be activated.
        route:
          type: array
          items:
            type: object
            properties:
              destination:
                type: object
                properties:
                  host:
                    type: string
                    description: The name of a service from the service registry.
                  port:
                    type: object
                    properties:
                      number:
                        type: integer
                  subset:
                    type: string
                    description: The name of a subset within the service.
              weight:
                type: integer
                description: Weight for traffic distribution.
          description: Route destinations with optional traffic weight.
        timeout:
          type: string
          description: Timeout for HTTP requests in duration format (e.g. 5s).
        retries:
          type: object
          properties:
            attempts:
              type: integer
            perTryTimeout:
              type: string
            retryOn:
              type: string
          description: Retry policy for HTTP requests.
        fault:
          type: object
          description: Fault injection policy.
        mirror:
          type: object
          description: Mirror HTTP traffic to another destination for testing.
        mirrorPercentage:
          type: object
          properties:
            value:
              type: number
          description: Percentage of traffic to mirror.
    DestinationRule:
      type: object
      properties:
        apiVersion:
          type: string
          enum:
            - networking.istio.io/v1
        kind:
          type: string
          enum:
            - DestinationRule
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            host:
              type: string
              description: >-
                The name of a service from the service registry. Rules defined
                for services that do not exist in the service registry will be
                ignored.
            trafficPolicy:
              type: object
              properties:
                connectionPool:
                  type: object
                  description: Settings controlling the volume of connections.
                loadBalancer:
                  type: object
                  description: Settings controlling the load balancer algorithms.
                outlierDetection:
                  type: object
                  description: Settings controlling eviction of unhealthy hosts.
                tls:
                  type: object
                  description: TLS related settings for connections to the upstream service.
              description: Traffic policies to apply for a specific destination.
            subsets:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: Name of the subset.
                  labels:
                    type: object
                    additionalProperties:
                      type: string
                    description: >-
                      Labels apply a filter over the endpoints of a service in
                      the service registry.
                  trafficPolicy:
                    type: object
                    description: Traffic policies for this subset.
              description: Named sets of endpoints that represent individual versions of a service.
            exportTo:
              type: array
              items:
                type: string
              description: >-
                A list of namespaces to which this destination rule is exported.
    DestinationRuleList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - DestinationRuleList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/DestinationRule'
    Gateway:
      type: object
      properties:
        apiVersion:
          type: string
          enum:
            - networking.istio.io/v1
        kind:
          type: string
          enum:
            - Gateway
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            selector:
              type: object
              additionalProperties:
                type: string
              description: >-
                One or more labels that indicate a specific set of pods/VMs on
                which this gateway configuration should be applied.
            servers:
              type: array
              items:
                type: object
                properties:
                  port:
                    type: object
                    properties:
                      number:
                        type: integer
                        description: A valid non-negative integer port number.
                      name:
                        type: string
                        description: Label assigned to the port.
                      protocol:
                        type: string
                        description: The protocol exposed on the port (HTTP, HTTPS, GRPC, TCP, TLS, MONGO).
                  hosts:
                    type: array
                    items:
                      type: string
                    description: >-
                      One or more hosts exposed by this gateway.
                  tls:
                    type: object
                    description: TLS options for the gateway.
              description: >-
                A list of server specifications describing the properties of the
                proxy on a given load balancer port.
    GatewayList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - GatewayList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Gateway'
    ServiceEntry:
      type: object
      properties:
        apiVersion:
          type: string
          enum:
            - networking.istio.io/v1
        kind:
          type: string
          enum:
            - ServiceEntry
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            hosts:
              type: array
              items:
                type: string
              description: The hosts associated with the ServiceEntry.
            addresses:
              type: array
              items:
                type: string
              description: Virtual IP addresses associated with the service.
            ports:
              type: array
              items:
                type: object
                properties:
                  number:
                    type: integer
                  protocol:
                    type: string
                  name:
                    type: string
              description: The ports associated with the external service.
            location:
              type: string
              enum:
                - MESH_EXTERNAL
                - MESH_INTERNAL
              description: Whether the service should be considered external or part of the mesh.
            resolution:
              type: string
              enum:
                - NONE
                - STATIC
                - DNS
                - DNS_ROUND_ROBIN
              description: Service discovery mode for the hosts.
            endpoints:
              type: array
              items:
                type: object
                properties:
                  address:
                    type: string
                  ports:
                    type: object
                    additionalProperties:
                      type: integer
                  labels:
                    type: object
                    additionalProperties:
                      type: string
              description: One or more endpoints associated with the service.
            exportTo:
              type: array
              items:
                type: string
    ServiceEntryList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - ServiceEntryList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServiceEntry'
    Sidecar:
      type: object
      properties:
        apiVersion:
          type: string
          enum:
            - networking.istio.io/v1
        kind:
          type: string
          enum:
            - Sidecar
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            workloadSelector:
              type: object
              properties:
                labels:
                  type: object
                  additionalProperties:
                    type: string
              description: Criteria used to select the specific set of workloads.
            ingress:
              type: array
              items:
                type: object
              description: Ingress specifies the configuration of the sidecar for processing inbound traffic.
            egress:
              type: array
              items:
                type: object
                properties:
                  hosts:
                    type: array
                    items:
                      type: string
                  port:
                    type: object
              description: Egress specifies the configuration of the sidecar for processing outbound traffic.
            outboundTrafficPolicy:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                    - REGISTRY_ONLY
                    - ALLOW_ANY
              description: Configuration for handling outbound traffic to services not in the registry.
    SidecarList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - SidecarList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Sidecar'
    WorkloadEntry:
      type: object
      properties:
        apiVersion:
          type: string
          enum:
            - networking.istio.io/v1
        kind:
          type: string
          enum:
            - WorkloadEntry
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            address:
              type: string
              description: Address associated with the network endpoint (IP or hostname).
            ports:
              type: object
              additionalProperties:
                type: integer
              description: Set of ports associated with the endpoint.
            labels:
              type: object
              additionalProperties:
                type: string
              description: One or more labels associated with the endpoint.
            network:
              type: string
              description: Network enables Istio to group endpoints resident in the same L3 domain.
            locality:
              type: string
              description: The locality associated with the endpoint (region/zone/subzone).
            weight:
              type: integer
              description: The load balancing weight associated with the endpoint.
            serviceAccount:
              type: string
              description: The service account associated with the workload.
    WorkloadEntryList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - WorkloadEntryList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkloadEntry'
    WorkloadGroup:
      type: object
      properties:
        apiVersion:
          type: string
          enum:
            - networking.istio.io/v1
        kind:
          type: string
          enum:
            - WorkloadGroup
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          type: object
          properties:
            metadata:
              type: object
              properties:
                labels:
                  type: object
                  additionalProperties:
                    type: string
                annotations:
                  type: object
                  additionalProperties:
                    type: string
              description: Metadata that will be used for all corresponding WorkloadEntries.
            template:
              type: object
              description: Template to be used for the generation of WorkloadEntry resources.
            probe:
              type: object
              description: ReadinessProbe describes the configuration for health checking.
    WorkloadGroupList:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum:
            - WorkloadGroupList
        metadata:
          $ref: '#/components/schemas/ListMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkloadGroup'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Kubernetes API server bearer token authentication
tags:
  - name: VirtualService
    description: HTTP/TCP routing rules for traffic management
    externalDocs:
      url: https://istio.io/latest/docs/reference/config/networking/virtual-service/
  - name: DestinationRule
    description: Policies applied to traffic after routing (load balancing, connection pool, outlier detection)
    externalDocs:
      url: https://istio.io/latest/docs/reference/config/networking/destination-rule/
  - name: Gateway
    description: Load balancer configuration at the edge of the mesh
    externalDocs:
      url: https://istio.io/latest/docs/reference/config/networking/gateway/
  - name: ServiceEntry
    description: External service entries added to the mesh service registry
    externalDocs:
      url: https://istio.io/latest/docs/reference/config/networking/service-entry/
  - name: Sidecar
    description: Sidecar proxy configuration for inbound and outbound traffic
    externalDocs:
      url: https://istio.io/latest/docs/reference/config/networking/sidecar/
  - name: WorkloadEntry
    description: Non-Kubernetes workload (VM/bare metal) endpoint properties
    externalDocs:
      url: https://istio.io/latest/docs/reference/config/networking/workload-entry/
  - name: WorkloadGroup
    description: Collection of workload instances sharing common properties
    externalDocs:
      url: https://istio.io/latest/docs/reference/config/networking/workload-group/
